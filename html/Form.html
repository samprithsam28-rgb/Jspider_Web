    <!-- Form

       Types of Form
        *User pespective=> text , password , Number , Email ,date , files , color

         <form action="url" method="get/post">

    <!-- form elements
     <input type="text" name="username" placeholder="Enter your name">  =>Accepts all types of data from the user , by changing the type attribute 
     => Single element can accept only one type of data from the user, inline
     Data from the user is known as (value)
     1.<label> -> used to provide a label for the form element ,to identify the purpose of input field 
     -->

    <!-- Creating Dropdown menu  / ComboBox 
    Using JavaScript -->

    Using JavaScript

    <p>Choose your Year of Pass-Out:</p>
    <select name=""  id="">
    <option value=""hidden> ------ Choose here-----</option>
    </select>

    <script>
        const dropDown = document.querySelector("select")
        let yearNow = new Date().getFullYear()
        let valueYear = yearNow
        for(let i=0; i<=10; i++)
        {
            dropDown.innerHTML += `<option value=${valueYear--}>${yearNow--}</option>`
        }
    </script>
