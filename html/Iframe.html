<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML | Iframe</title>
</head>
<body>
    <!-- Iframe   - stands for "inline frame" and is used to embed another document within the current HTML document 
    ==> We are going to embed a google maps.
    ==> Display youtube videos
    ==> Payment pages integration
    
    
    ==>>   Syntax: <ifram src="URL" frameborder="0"> File not Supported By Browser 

    ==> Embedded Local  web pages
    <iframe src="Media.html" width="100%" height="500px" frameborder="0">
    </iframe>  -->

    <iframe src="Media.html" frameborder="1" height="500px" width="60%"></iframe>
    

    <!-- Google Maps -->


    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14905.162633639786!2d77.5983032072531!3d12.906391231077375!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae1522618aed9b%3A0xf4e2efa7117b4197!2sJSpiders%20BTM%20Layout!5e0!3m2!1sen!2sin!4v1775641518918!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
   
    <!-- YouTube Video -->

    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    


</body>
</html>
