<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML | Hyper Links</title>
</head>
<body>

    <!-- Hyper Links
    ==> Anchor Tags   <a></a>
    ==> Paired
    =>> Syntax:
    <a href="URL"> target="">link Text</a>
    -- href : Hyperlink Reference => name/path/url
    -- target : Specifies where to open next page - self, _blank, _parent, _top -->

    <!-- Linking to Local Pages -->

    <a href="iframe.html" target="_self">Click Here</a>
    <br><br>

    <!-- Linking to External Pages -->

    <a href="https://www.google.com" target="_blank">Google</a>
    <br><br>
    <a href="https://www.facebook.com" target="_blank">Facebook</a>
    <br><br>
    <a href="https://qspiders.com/branches/btm-jspiders?branchId=8-branchId" target="_blank">JSpiders BTM Layout</a>
    <br><br>
    <!-- Linking to Contact Numbers -->
    <a href="tel:+919876543210">Call Us(&phone;)</a>
    <br><br>

    <!-- Linking to Email Addresses -->
    <a href="mailto:info@qspiders.com">Email Us</a>
    <br><br>

    <!-- Linking to Whatapp Chat -->
    <a href="https://wa.me/91789221989" target="_blank">Chat on WhatsApp</a>
    <br><br>

</body>
</html>
