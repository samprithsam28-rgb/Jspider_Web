    <!-- Table

    =>  Arranging data in rows and columns
    <table> <tr> , <th> , <td>
    Syntax:
    <table>
        <tr>
            <th>head </th>
            <th>head </th>
            <th>head </th>
        </tr>

        <tr>
            <td>data </td>

            <td>data </td>
        </tr>
        
        <tr> 
            <td>data </td>

        </tr>
    </table>-->


    <!--row1  -->

    <!-- cellPadding => gives space inside the cells
        cellSpacing => gives space between one  cell to another cell
        border => gives border thickness to the table 
        align="center" => to align the table in center
        style="text-align: center;" => to align the text in center of the cell
        <table> => arranging data in rows and columns
        <th> => table header
        <tr> => table row
        <td> => table data-->

    <table border="1" cellspacing="0" cellpadding="10" align="center" style="text-align: center; border-collapse: collapse; background-color: lightgray;">
    <tr>
    <th colspan="7" bgcolor="lightblue">Passenger Bus Booking Details</th>
